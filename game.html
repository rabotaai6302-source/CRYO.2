<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CRYOTEST — TEST</title>
<link rel="stylesheet" href="./game.css">
</head>
<body>

<div class="bg"></div>
<div class="sceneLoading" id="sceneLoading">
  <div class="sceneLoadingInner">
    <div class="sceneLoadingLabel" id="sceneLoadingLabel">Калибровка матрицы сознания</div>
    <div class="sceneLoadingBar"><span id="sceneLoadingBarFill"></span></div>
  </div>
</div>

<div class="audioModal" id="audioModal" style="display:none;">
  <div class="audioBox">
    <div class="audioTitle">AUDIO CHANNEL</div>
    <div class="audioText">Включить атмосферу?</div>
    <div class="audioButtons">
      <button id="audioYes">✓ ВКЛ</button>
      <button id="audioNo">✕ ВЫКЛ</button>
    </div>
  </div>
</div>

<div class="wrap" id="gameWrap" style="visibility:hidden;">
  <div class="screen">
    <div class="sceneShell">
      <div class="sceneStage" id="sceneStage">
        <div class="sceneImageWrap" id="sceneImageWrap" style="display:none;">
          <img class="sceneImage" id="sceneImage" alt="">

          <div class="sceneControls" id="sceneControls">
            <button class="hudPill" id="soundBtn" type="button">
              <span class="pillDot"></span>
              <span>ЗВУК</span>
            </button>
            <a class="hudLink" href="./index.html">МЕНЮ</a>
          </div>

          <div class="sceneBottomOverlay">
            <div class="choiceDock" id="choiceDock" style="display:none;">
              <div class="choiceGrid" id="choiceGrid"></div>
            </div>
            <div class="sceneTextWrap sceneTextWrapOverlay" id="sceneTextWrap" style="display:none;">
              <div class="textPanel">
                <div class="textInner" id="sceneText"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="fallbackDock" id="fallbackDock" style="display:none;">
          <div class="sceneControls sceneControlsFallback">
            <button class="hudPill" id="soundBtnFallback" type="button">
              <span class="pillDot"></span>
              <span>ЗВУК</span>
            </button>
            <a class="hudLink" href="./index.html">МЕНЮ</a>
          </div>
          <div class="choiceGrid fallbackChoiceGrid" id="fallbackGrid"></div>
          <div class="sceneTextWrap fallbackTextWrap" id="fallbackTextWrap" style="display:none;">
            <div class="textPanel">
              <div class="textInner" id="fallbackText"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="build" id="buildId"></div>
    </div>
  </div>
</div>

<div id="overlay"></div>

<script src="./effectController.js"></script>
<script src="./app.js"></script>

</body>
</html>
